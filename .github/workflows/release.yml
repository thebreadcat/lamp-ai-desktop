name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cmd: npm run build:mac
            artifact: mac
          - os: windows-latest
            cmd: npm run build:win
            artifact: win
          - os: ubuntu-latest
            cmd: npm run build:linux
            artifact: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ImageMagick (icons)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
          elif [ "${{ runner.os }}" = "macOS" ]; then
            brew install imagemagick || true
          else
            choco install imagemagick -y || echo "icons may be missing on Windows"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Prepare Lamp + icons
        env:
          LAMP_REPO: https://github.com/thebreadcat/lamp-ai.git
        run: |
          python3 scripts/ensure-lamp.py
          bash scripts/generate-icons.sh

      - name: Bundle embedded Python
        run: node scripts/bundle-python.mjs

      - name: Build installer
        run: ${{ matrix.cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lamp-${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | head -50

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
